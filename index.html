<!DOCTYPE html>
<html lang="fi">
<head>
    <title>Kylpyhuone AR 1:1</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background-color: #1a1a1a; }
        model-viewer { width: 100%; height: 100vh; --poster-color: transparent; }
        #ar-button {
            background-color: #007bff; border-radius: 30px; border: none; color: white;
            padding: 15px 30px; position: absolute; bottom: 50px; left: 50%;
            transform: translateX(-50%); z-index: 100; font-weight: bold;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="kylpyhuone.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-scale="fixed"
        ar-placement="floor"
        camera-controls 
        touch-action="none"
        shadow-intensity="1">
        
        <button slot="ar-button" id="ar-button">
            🚀 ALOITA AR-ESITTELY
        </button>

    </model-viewer>

</body>
</html>
